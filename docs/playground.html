    const IMAGE_TYPES = new Set(['png','jpg','jpeg','gif','webp','svg']);
    const TEXT_TYPES  = new Set(['txt','lua','luau','json','xml','html','css','js','md','csv','ansi']);
    const MIME = {
      png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg', gif:'image/gif',
      webp:'image/webp', svg:'image/svg+xml',
      txt:'text/plain', lua:'text/plain', luau:'text/plain', ansi:'text/plain',
      json:'application/json', xml:'text/xml', html:'text/html',
      css:'text/css', js:'text/javascript', md:'text/plain', csv:'text/csv',
    };

    function addFileLink(name, type, base64) {
      const t     = type.toLowerCase();
      const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      const blob  = new Blob([bytes], { type: MIME[t] || 'application/octet-stream' });
      const url   = URL.createObjectURL(blob);

      const container = document.createElement("div");
      container.className = "file-item";
      const a = document.createElement("a");
      a.href = url; a.className = "file-link"; a.textContent = "⬇ " + name;

      if (IMAGE_TYPES.has(t)) {
        a.target = "_blank";
        const img = document.createElement("img");
        img.src = url; img.title = "Click to enlarge";
        img.addEventListener("click", e => {
          e.preventDefault();
          lightboxImg.src = url;
          lightbox.classList.add("open");
        });
        container.appendChild(a);
        container.appendChild(img);
      } else if (TEXT_TYPES.has(t)) {
        a.target = "_blank";
        container.appendChild(a);
      } else {
        a.download = name;
        container.appendChild(a);
      }
      filesEl.appendChild(container);
    }

    const timestampCheck = document.getElementById("timestampCheck");
    timestampCheck.checked = localStorage.getItem("luau_timestamp") === "1";
    timestampCheck.addEventListener("change", () =>
      localStorage.setItem("luau_timestamp", timestampCheck.checked ? "1" : "0"));

    function injectFlags(code) {
      if (!timestampCheck.checked) return code;
      // Skip past leading hot-comment flags (--!strict, --!optimize, --!native, --!nolint)
      const lines = code.split("\n");
      let i = 0;
      while (i < lines.length && /^\s*--!/.test(lines[i])) i++;
      if (i < lines.length) lines[i] = 'setenvkey("TIMESTAMP",true);' + lines[i];
      else lines.push('setenvkey("TIMESTAMP",true)');
      return lines.join("\n");
    }

    runBtn.addEventListener("click", async () => {
      const raw = editor.getValue();
      if (!raw.trim()) return;
      const code = injectFlags(raw);
      _pendingCode = raw; // save original (pre-inject) code for history

      outputEl.innerHTML = "";
      filesEl.innerHTML  = "";
      setStatus("Starting...");
      setRunning(true);

      const res = await fetch(`${SERVER}/run`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code }),
      });

      if (!res.ok) {
        if (res.status === 429) {
          setStatus("Rate limited — max 30 runs/min");
          setRunning(false);
          runBtn.disabled = true;
          setTimeout(() => { runBtn.disabled = false; }, 5000);
        } else {
          let msg;
          try { msg = (await res.json()).error; } catch { msg = await res.text(); }
          setStatus("Error: " + msg);
          setRunning(false);
        }
        return;
      }

      const { token } = await res.json();
      currentToken = token;

      if (es) es.close();
      es = new EventSource(`${SERVER}/stream/${token}`);

      let _serverNum = null;
      es.addEventListener("output", e => {
        const { content, serverNum } = JSON.parse(e.data);
        _serverNum = serverNum;
        setStatus(`Server #${serverNum}`);
        setOutput(content);
        filesEl.innerHTML = "";
      });
      es.addEventListener("file", e => {
        const { name, type, content } = JSON.parse(e.data);
        addFileLink(name, type, content);
      });
      es.addEventListener("done", e => {
        const { runtime } = JSON.parse(e.data);
        const serverPart = _serverNum != null ? `Server #${_serverNum} · ` : "";
        setStatus(`${serverPart}Done (${(+runtime).toFixed(4)}s)`);
        setRunning(false);
        es.close();
        currentToken = null;
        if (_pendingCode && histRecordCheck.checked) { pushHistory(_pendingCode, outputEl.innerHTML, filesEl.innerHTML, _serverNum, +runtime); }
        _pendingCode = null;
      });
      es.addEventListener("error", e => {
        try { setStatus("Error: " + JSON.parse(e.data).message); }
        catch { setStatus("Connection lost"); }
        setRunning(false);
        es.close();
        currentToken = null;
        if (_pendingCode && histRecordCheck.checked) { pushHistory(_pendingCode, outputEl.innerHTML, filesEl.innerHTML, _serverNum, null); }
        _pendingCode = null;
      });
    });

    // ── Run History ──
    const HISTORY_KEY = "luau_history";
    const HISTORY_MAX = 10;
    const historyList = document.getElementById("history-list");
    const historyEmpty = document.getElementById("history-empty");

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; }
    }
    function saveHistory(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

    function histLabel(code) {
      const line = code.split("\n").find(l => l.trim() && !/^\s*--/.test(l)) || code.split("\n")[0];
      return line.trim().slice(0, 40) || "(empty)";
    }
    function histTime(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
             d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function renderHistory() {
      const h = loadHistory();
      historyList.innerHTML = "";
      if (h.length === 0) { historyList.appendChild(historyEmpty); return; }
      for (let i = 0; i < h.length; i++) {
        const entry = h[i];
        const item = document.createElement("div");
        item.className = "hist-item";

        const body = document.createElement("div");
        body.className = "hist-body";
        const serverTag = entry.serverNum != null ? ` · #${entry.serverNum}` : "";
        const runtimeTag = entry.runtime != null ? ` · ${entry.runtime.toFixed(2)}s` : "";
        body.innerHTML = `<div class="hist-label">${entry.label}</div><div class="hist-time">${histTime(entry.ts)}${serverTag}${runtimeTag}</div>`;
        body.addEventListener("click", () => loadHistoryEntry(entry));

        const del = document.createElement("button");
        del.className = "hist-del";
        del.title = "Remove";
        del.textContent = "×";
        del.addEventListener("click", e => {
          e.stopPropagation();

          h2.splice(i, 1);
          saveHistory(h2);
          renderHistory();
        });

        item.appendChild(body);
        item.appendChild(del);
        historyList.appendChild(item);
      }
    }

    function loadHistoryEntry(entry) {
      // Stop any running session
      if (currentToken) {
        fetch(`${SERVER}/stop/${currentToken}`, { method: "POST" }).catch(() => {});
        if (es) { es.close(); es = null; }

      setStatus("Loaded from history");
    }

    function pushHistory(code, output, files, serverNum, runtime) {
      const h = loadHistory();
      h.unshift({ ts: Date.now(), label: histLabel(code), code, output, files, serverNum, runtime });
      if (h.length > HISTORY_MAX) h.length = HISTORY_MAX;
      saveHistory(h);
      renderHistory();
    }

    // ── Mobile bottom sheet ──
    const histSheet         = document.getElementById("hist-sheet");
    const histSheetBackdrop = document.getElementById("hist-sheet-backdrop");
    const histSheetList     = document.getElementById("hist-sheet-list");
    const histSheetBtn      = document.getElementById("hist-sheet-btn");
    const histSheetClose    = document.getElementById("hist-sheet-close");

    function openHistSheet() {
      histSheetList.innerHTML = historyList.innerHTML;
      histSheetList.querySelectorAll(".hist-body").forEach((body, i) => {
        body.addEventListener("click", () => { closeHistSheet(); loadHistoryEntry(loadHistory()[i]); });
      });
      histSheetList.querySelectorAll(".hist-del").forEach((del, i) => {
        del.addEventListener("click", e => {
          e.stopPropagation();
          const h = loadHistory(); h.splice(i, 1); saveHistory(h);
          renderHistory(); openHistSheet();
        });
      });
      histSheetBackdrop.classList.add("open");
      requestAnimationFrame(() => histSheet.classList.add("open"));
    }
    function closeHistSheet() {
      histSheet.classList.remove("open");
      histSheetBackdrop.classList.remove("open");
    }
    histSheetBtn.addEventListener("click", openHistSheet);
    document.getElementById("hist-bottom-tab").addEventListener("click", openHistSheet);
    histSheetClose.addEventListener("click", closeHistSheet);
    histSheetBackdrop.addEventListener("click", closeHistSheet);

    renderHistory();

    // Record toggle
    const histRecordCheck = document.getElementById("histRecordCheck");
    histRecordCheck.checked = localStorage.getItem("luau_hist_record") !== "1"; // default off
    histRecordCheck.addEventListener("change", () =>
      localStorage.setItem("luau_hist_record", histRecordCheck.checked ? "1" : "0"));

    function clearHistory() {
      saveHistory([]);
      renderHistory();
    }
    document.getElementById("hist-clear-btn").addEventListener("click", clearHistory);
    document.getElementById("hist-sheet-clear").addEventListener("click", () => {
      clearHistory();
      openHistSheet(); // re-render the sheet list
    });

    // ── Desktop history popover ──
    const histPopover    = document.getElementById("hist-popover");
    const histPopoverBtn = document.getElementById("hist-popover-btn");

    function openHistPopover() {
      const rect = histPopoverBtn.getBoundingClientRect();
      histPopover.style.top  = (rect.bottom + 6) + "px";
      histPopover.style.right = (window.innerWidth - rect.right) + "px";
      histPopover.classList.add("open");
    }
    function closeHistPopover() { histPopover.classList.remove("open"); }

    histPopoverBtn.addEventListener("click", e => {
      e.stopPropagation();
      if (histPopover.classList.contains("open")) closeHistPopover();
      else { renderHistory(); openHistPopover(); }
    });

    document.addEventListener("click", e => {
      if (histPopover.classList.contains("open") && !histPopover.contains(e.target))
        closeHistPopover();
    });

    // Save to history when a run completes or errors
    let _pendingCode = null;

    stopBtn.addEventListener("click", async () => {
      if (!currentToken) return;
      await fetch(`${SERVER}/stop/${currentToken}`, { method: "POST" });
      setStatus("Stopped");
      setRunning(false);
      if (es) { es.close(); es = null; }
      currentToken = null;
    });

    sendBtn.addEventListener("click", e => sendInput(e.shiftKey));
    inputBox.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); sendInput(e.shiftKey); }
    });

    async function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Normal send: text first, then 1 file from the front of the queue
    // Shift+send: text first, then ALL queued files
    async function sendInput(all = false) {
      if (!currentToken) return;
      if (!inputBox.value && queuedFiles.length === 0) return;

      if (inputBox.value) {
        await fetch(`${SERVER}/input/${currentToken}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: inputBox.value }),
        });
        inputBox.value = "";
      }

      const batch = all ? queuedFiles.splice(0) : queuedFiles.splice(0, 1);
      renderFileQueue();

      for (const { file } of batch) {
        const base64 = await fileToBase64(file);
        await fetch(`${SERVER}/input/${currentToken}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input: base64, isFile: true }),
        });
      }
    }
  </script>
</body>
</html>
